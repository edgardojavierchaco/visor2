<form
    method="post"
    id="formActividad"
    action="{% url 'bnhpersonas:actividad_update' object.id %}">

    {% csrf_token %}

    <div class="row">

        {% for field in form %}

            <div class="col-md-6 mb-3">

                <label class="form-label">

                    {{ field.label }}

                </label>

                {{ field }}

                {% if field.errors %}

                    <div class="text-danger small mt-1">

                        {{ field.errors }}

                    </div>

                {% endif %}

            </div>

        {% endfor %}

    </div>

    <div class="text-end mt-3">

        <button
            type="button"
            class="btn btn-secondary"
            data-bs-dismiss="modal">

            Cancelar

        </button>

        <button
            type="submit"
            class="btn btn-primary">

            Guardar cambios

        </button>

    </div>

</form>
