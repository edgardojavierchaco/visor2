{% load static %}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Carga Personal</title>   

    <!-- (opcional pero recomendado si usás Bootstrap/Select2) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet"/>

    <link rel="stylesheet" href="{% static 'bnh/css/app.css' %}">
</head>

<body>

<div class="container">

    <h2>Gestión de Personal</h2>

    <div class="nav nav-tabs mb-3">

        <button 
            class="nav-link active"
            onclick="openTab('persona', event)">
            Persona
        </button>


        <button 
            class="nav-link"
            onclick="openTab('actividades', event)">
            Actividades
        </button>

    </div>

    <!-- PERSONA -->
    <div id="tab-persona" class="tab-content active">
        {% include "bnh/personas/partials/persona_form.html" %}
    </div>

    <!-- ACTIVIDADES -->
    <div id="tab-actividades" class="tab-content">
        {% include "bnh/personas/partials/actividad_form.html" %}
        <hr>
        {% include "bnh/personas/partials/actividades_list.html" %}
    </div>

</div>

<!-- JS base -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- tus scripts -->
<script src="{% static 'bnh/js/tabs.js' %}"></script>
<script src="{% static 'bnh/js/persona.js' %}"></script>
<script src="{% static 'bnh/js/actividades.js' %}"></script>
<script src="{% static 'bnh/js/horarios.js' %}"></script>

<script>

$(document).ready(function(){

    $('.select2').select2({
        width:'100%'
    });

});

</script>

</body>
</html>
