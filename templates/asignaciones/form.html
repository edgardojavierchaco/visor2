{% extends "archivos/base/layout.html" %}
{% load static %}

{% block content %}

<div class="container mt-4">

<div class="d-flex justify-content-between align-items-center mb-4">

    <h3>

        {% if modo == "crear" %}
            ➕ Nueva Asignación
        {% else %}
            ✏ Editar Asignación
        {% endif %}

    </h3>

    <a href="{% url 'asignacionesuperv:panel' %}"
       class="btn btn-outline-secondary">

        ← Volver

    </a>

</div>

<!-- ALERT -->
<div id="alerta"></div>

<!-- FORM -->
<div class="card shadow-sm">

<div class="card-body">

<div class="row g-3">

<div class="col-md-6">

<label class="form-label">
Escuela
</label>

<select
    id="escuelaSelect"
    class="form-select">
</select>

</div>

<div class="col-md-3">

<label class="form-label">
Desde
</label>

<input
    type="date"
    id="fecha_desde"
    class="form-control">

</div>

<div class="col-md-3">

<label class="form-label">
Hasta
</label>

<input
    type="date"
    id="fecha_hasta"
    class="form-control">

</div>

</div>

<div class="mt-3">

<button
    id="agregarFila"
    class="btn btn-primary">

    + Agregar

</button>

</div>

</div>

</div>

<!-- TABLA -->
<div class="card shadow-sm mt-4">

<div class="card-body">

<table
    id="tablaAsignaciones"
    class="table table-bordered table-hover align-middle">

<thead class="table-dark">

<tr>

<th>CUEANEXO</th>
<th>Escuela</th>
<th>Desde</th>
<th>Hasta</th>
<th>Acciones</th>

</tr>

</thead>

<tbody></tbody>

</table>

</div>
</div>

<!-- BOTON -->
<div class="mt-4">

<button
    id="guardarBtn"
    class="btn btn-success btn-lg">

    💾 Guardar Asignaciones

</button>

</div>

</div>

<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css"
rel="stylesheet"/>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<script>

const urlAjaxEscuelas =
"{% url 'asignacionesuperv:ajax_escuelas' %}";

const urlGuardar =
"{% url 'asignacionesuperv:ajax_asignar' %}";

let dataInicial =
{{ data_inicial|safe }};

function showAlert(msg, ok=true){

    $("#alerta").html(
        `
        <div class="alert alert-${
            ok ? "success":"danger"
        } alert-dismissible fade show">

            ${msg}

            <button type="button"
                    class="btn-close"
                    data-bs-dismiss="alert">
            </button>

        </div>
        `
    );
}

$(document).ready(function(){

    // SELECT2
    $("#escuelaSelect").select2({

        width:"100%",

        placeholder:
            "Buscar escuela",

        ajax:{

            url:
                urlAjaxEscuelas,

            dataType:
                "json",

            delay:
                250,

            data:
                params => ({
                    q:
                        params.term
                }),

            processResults:
                data => ({
                    results:
                        data.results
                })
        }
    });

    // DATA INICIAL
    if(dataInicial.length){

        dataInicial.forEach(
            addRow
        );
    }

});

function addRow(item){

    let html = `
    <tr>

        <td>
            ${item.cueanexo}
        </td>

        <td>
            ${item.nom_est}
        </td>

        <td>
            ${item.fecha_desde}
        </td>

        <td>
            ${item.fecha_hasta}
        </td>

        <td>

            <button
                class="btn btn-danger btn-sm remove">

                🗑

            </button>

        </td>

    </tr>
    `;

    $("#tablaAsignaciones tbody")
        .append(html);
}

$("#agregarFila").click(function(){

    let escuela =
        $("#escuelaSelect").select2(
            "data"
        )[0];

    let desde =
        $("#fecha_desde").val();

    let hasta =
        $("#fecha_hasta").val();

    if(!escuela){

        showAlert(
            "Seleccione escuela",
            false
        );

        return;
    }

    if(!desde || !hasta){

        showAlert(
            "Complete fechas",
            false
        );

        return;
    }

    if(hasta < desde){

        showAlert(
            "Fecha hasta inválida",
            false
        );

        return;
    }

    addRow({

        cueanexo:
            escuela.id,

        nom_est:
            escuela.text,

        fecha_desde:
            desde,

        fecha_hasta:
            hasta

    });

});

$(document).on(
    "click",
    ".remove",
    function(){

        $(this)
            .closest("tr")
            .remove();
});

$("#guardarBtn").click(function(){

    let data = [];

    $("#tablaAsignaciones tbody tr")
        .each(function(){

        let td =
            $(this).find("td");

        data.push({

            cueanexo:
                td.eq(0).text().trim(),

            fecha_desde:
                td.eq(2).text().trim(),

            fecha_hasta:
                td.eq(3).text().trim()

        });

    });

    if(!data.length){

        showAlert(
            "Sin datos",
            false
        );

        return;
    }

    $.post(

        urlGuardar,

        {

            data:
                JSON.stringify(
                    data
                ),

            csrfmiddlewaretoken:
                "{{ csrf_token }}"

        },

        function(res){

            if(!res.ok){

                showAlert(
                    res.error ||
                    "Error",
                    false
                );
                return;
            }

            let msg = `
                ✔ Guardado

                <br>

                Creadas:
                <strong>
                ${res.creadas}
                </strong>

                <br>

                Actualizadas:
                <strong>
                ${res.actualizadas}
                </strong>
            `;

            if(
                res.errores &&
                res.errores.length
            ){

                msg +=
                "<hr><b>Errores:</b><br>" +
                res.errores.join(
                    "<br>"
                );
            }

            showAlert(
                msg
            );

            setTimeout(
                ()=>{
                    location.href =
                    "{% url 'asignacionesuperv:panel' %}";
                },
                1500
            );
        }

    );

});

</script>

{% endblock %}
