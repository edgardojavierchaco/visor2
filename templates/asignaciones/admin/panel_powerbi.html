{% extends "archivos/base/layout.html" %}
{% load static %}

{% block content %}

<div class="container-fluid mt-4">

<div class="d-flex justify-content-between align-items-center mb-4">

    <h3 class="mb-0">
        📡 Sala de Situación Ministerial
    </h3>

    <button
        id="exportPdf"
        class="btn btn-danger">

        📄 Exportar PDF

    </button>

</div>

<!-- FILTROS -->
<div class="card shadow-sm mb-4">

<div class="card-body">

<div class="row g-3">

<div class="col-md-4">

<label class="form-label">
Región
</label>

<select
    id="regionFilter"
    class="form-select">

<option value="">
Todas
</option>

</select>

</div>

<div class="col-md-4">

<label class="form-label">
Supervisor
</label>

<select
    id="supervisorFilter"
    class="form-select">

<option value="">
Todos
</option>

</select>

</div>

<div class="col-md-4">

<label class="form-label">
Oferta
</label>

<select
    id="ofertaFilter"
    class="form-select">

<option value="">
Todas
</option>

</select>

</div>

</div>

</div>
</div>

<!-- KPI -->
<div class="row g-3 mb-4 text-center">

<div class="col-md-3">
<div class="card bg-secondary text-white shadow">
<div class="card-body">
<h6>Borrador</h6>
<h2 id="kpiBorrador">0</h2>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card bg-primary text-white shadow">
<div class="card-body">
<h6>Enviado</h6>
<h2 id="kpiEnviado">0</h2>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card bg-warning text-dark shadow">
<div class="card-body">
<h6>Observado</h6>
<h2 id="kpiObservado">0</h2>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card bg-success text-white shadow">
<div class="card-body">
<h6>Aprobado</h6>
<h2 id="kpiAprobado">0</h2>
</div>
</div>
</div>

</div>

<!-- MAPA -->
<div class="card shadow-sm mb-4">

<div class="card-header">
🗺 Distribución Territorial
</div>

<div class="card-body p-0">

<div id="map"
     style="height:500px;">
</div>

</div>
</div>

<!-- LOGS -->
<div class="card shadow-sm">

<div class="card-header">
📝 Auditoría Reciente
</div>

<div class="card-body">

<table
    class="table table-striped"
    id="tablaLogs">

<thead>

<tr>
<th>Usuario</th>
<th>Acción</th>
<th>Objeto</th>
<th>Fecha</th>
</tr>

</thead>

<tbody id="logsBody">
</tbody>

</table>

</div>
</div>

</div>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const dashboardURL =
"{% url 'asignacionesuperv:dashboard_realtime_api' %}";

const filtrosURL =
"{% url 'asignacionesuperv:filtros_catalogo' %}";

const exportURL =
"{% url 'asignacionesuperv:export_pdf_admin' %}";

let map = L.map('map').setView(
    [-27.45,-58.98],
    7
);

L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
        attribution:'OSM'
    }
).addTo(map);

let markers = [];

function limpiarMapa(){

    markers.forEach(
        m => map.removeLayer(m)
    );

    markers = [];
}

function colorEstado(estado){

    if(estado==="APROBADO")
        return "green";

    if(estado==="OBSERVADO")
        return "orange";

    if(estado==="ENVIADO")
        return "blue";

    return "gray";
}

function cargarFiltros(){

    $.get(
        filtrosURL,
        function(res){

            res.regiones.forEach(
                r=>{
                    $("#regionFilter").append(
                        `<option>${r}</option>`
                    );
                }
            );

            res.ofertas.forEach(
                o=>{
                    $("#ofertaFilter").append(
                        `<option>${o}</option>`
                    );
                }
            );

            res.supervisores.forEach(
                s=>{
                    $("#supervisorFilter").append(
                        `
                        <option value="${s.supervisor_id}">
                        ${s.label}
                        </option>
                        `
                    );
                }
            );
        }
    );
}

function cargarDashboard(){

    $.get(
        dashboardURL,
        {
            region:
                $("#regionFilter").val(),

            supervisor:
                $("#supervisorFilter").val(),

            oferta:
                $("#ofertaFilter").val()
        },

        function(res){

            $("#kpiBorrador")
                .text(
                    res.resumen.BORRADOR
                );

            $("#kpiEnviado")
                .text(
                    res.resumen.ENVIADO
                );

            $("#kpiObservado")
                .text(
                    res.resumen.OBSERVADO
                );

            $("#kpiAprobado")
                .text(
                    res.resumen.APROBADO
                );

            limpiarMapa();

            res.escuelas.forEach(
                e=>{

                if(
                    !e.lat ||
                    !e.long
                ) return;

                let marker =
                    L.circleMarker(
                    [
                        e.lat,
                        e.long
                    ],
                    {
                        radius:8,
                        color:
                            colorEstado(
                                e.estado
                            )
                    })
                    .addTo(map);

                marker.bindPopup(
                    `
                    <b>${e.nom_est}</b>
                    <br>
                    ${e.cueanexo}
                    <br>
                    ${e.estado}
                    `
                );

                markers.push(
                    marker
                );

            });

            $("#logsBody").empty();

            res.logs.forEach(
                l=>{

                $("#logsBody").append(
                    `
                    <tr>
                    <td>${l.usuario}</td>
                    <td>${l.accion}</td>
                    <td>${l.objeto}</td>
                    <td>${l.timestamp}</td>
                    </tr>
                    `
                );

            });

        }

    ).fail(function(xhr){

        if(
            xhr.status===403
            ||
            xhr.status===401
        ){

            alert(
                "Sesión expirada o sin permisos"
            );

            location.reload();
        }
    });
}

$("#regionFilter,#supervisorFilter,#ofertaFilter")
.change(
    cargarDashboard
);

$("#exportPdf").click(function(){

    let url =
        exportURL
        +
        "?"
        +
        $.param({

            region:
                $("#regionFilter").val(),

            supervisor:
                $("#supervisorFilter").val(),

            oferta:
                $("#ofertaFilter").val()

        });

    window.open(
        url,
        "_blank"
    );
});

$(document).ready(function(){

    cargarFiltros();
    cargarDashboard();

    setInterval(
        cargarDashboard,
        60000
    );

});

</script>

{% endblock %}
