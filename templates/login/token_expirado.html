{% extends "dashboard/body.html" %}
{% load static %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow border-0">

                <div class="card-body text-center p-5">

                    <div class="mb-4">
                        <i class="fas fa-exclamation-triangle fa-4x text-warning"></i>
                    </div>

                    <h2 class="mb-3 text-warning">
                        Enlace expirado
                    </h2>

                    <p class="lead">
                        El enlace de confirmación ya no es válido.
                    </p>

                    <p class="text-muted">
                        Volvé a iniciar sesión para recibir
                        un nuevo correo de autorización.
                    </p>

                    <a
                        href="{% url 'logueo:login' %}"
                        class="btn btn-warning btn-lg mt-3"
                    >
                        <i class="fas fa-redo"></i>
                        Volver al login
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
