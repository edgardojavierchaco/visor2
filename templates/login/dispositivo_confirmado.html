{% extends "dashboard/body.html" %}
{% load static %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow border-0">

                <div class="card-body text-center p-5">

                    <div class="mb-4">
                        <i class="fas fa-check-circle fa-4x text-success"></i>
                    </div>

                    <h2 class="mb-3 text-success">
                        Dispositivo confirmado
                    </h2>

                    <p class="lead">
                        El dispositivo fue autorizado correctamente.
                    </p>

                    <p class="text-muted">
                        Ya podés ingresar nuevamente a
                        <strong>
                            Visor Educativo Chaco
                        </strong>.
                    </p>

                    <a
                        href="{% url 'logueo:login' %}"
                        class="btn btn-success btn-lg mt-3"
                    >
                        <i class="fas fa-sign-in-alt"></i>
                        Ir al login
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
