{% extends 'biblioteca/list.html' %}
{% load static %}

{% block content %}
<h2>Listado de Destino de Fondos</h2>

<table id="tabla" class="table table-bordered table-striped">
    <thead>
        <tr>
            <th>CUEANEXO</th>
            <th>MES</th>
            <th>AÑO</th>
            <th>DESTINO</th>
            <th>CANTIDAD</th>
            <th>DESCRIPCIÓN</th>
            <th>ACCIONES</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<!-- LIBS -->
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<script>
let tabla = $('#tabla').DataTable({
    ajax: {
        url: "{{ list_url }}",
        type: "GET",
        dataSrc: "data"
    },
    columns: [
        { data: "cueanexo" },
        { data: "mes" },
        { data: "anio" },
        { data: "destino" },
        { data: "cantidad" },
        { data: "descripcion" },
        {
            data: "id",
            render: function (data) {
                return `
                    <button class="btn btn-danger btn-sm eliminar" data-id="${data}">
                        Eliminar
                    </button>
                `;
            }
        }
    ]
});

// =======================
// ELIMINAR (AJAX)
// =======================
$('#tabla tbody').on('click', '.eliminar', function () {

    let id = $(this).data('id');

    if (!confirm("¿Eliminar registro?")) return;

    fetch(`/bibliotecas/regfondos/delete/${id}/`, {
        method: 'GET',
        headers: {
            'X-Requested-With': 'XMLHttpRequest'
        }
    })
    .then(res => res.json())
    .then(() => {
        tabla.ajax.reload();
    });
});
</script>

{% endblock %}
