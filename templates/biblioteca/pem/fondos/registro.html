{% extends 'biblioteca/layout.html' %}

{% block content %}
<h2>Registro de Destino de Fondos</h2>

<!-- SWEETALERT CORREGIDO -->
{% if messages %}
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    const messages = [
        {% for message in messages %}
        {
            text: "{{ message|escapejs }}",
            tags: "{{ message.tags }}"
        },
        {% endfor %}
    ];

    const msg = messages[messages.length - 1]; // 👈 toma el último real

    let icon = "success";
    let title = "Éxito";

    if (msg.tags.includes("error")) {
        icon = "error";
        title = "Error";
    } else if (msg.tags.includes("warning")) {
        icon = "warning";
        title = "Atención";
    }

    Swal.fire({
        icon: icon,
        title: title,
        text: msg.text,
        confirmButtonText: "OK"
    });
</script>
{% endif %}

<!-- FORM -->
<form method="POST" action="{% url 'bibliotecas:regfondos' %}">
    {% csrf_token %}

    <input type="hidden" name="cueanexo" value="{{ cueanexo }}">
    <input type="hidden" name="mes" value="{{ mes }}">
    <input type="hidden" name="anio" value="{{ anio }}">

    <table class="table table-bordered" id="destinos-table">
        <thead>
            <tr>
                <th>Destino</th>
                <th>Descripción</th>
                <th>Acción</th>
            </tr>
        </thead>

        <tbody id="table-body">
            <tr>
                <td>
                    <select name="destino_0" class="form-control">
                        {% for d in destino %}
                            <option value="{{ d.id }}">{{ d.nom_fondo }}</option>
                        {% endfor %}
                    </select>
                </td>
                <td>
                    <input type="text" name="descripcion_0" class="form-control">
                </td>
                <td>
                    <button type="button" class="btn btn-danger remove-row">Eliminar</button>
                </td>
            </tr>
        </tbody>
    </table>

    <button type="button" class="btn btn-success" id="add-row">Agregar fila</button>
    <br><br>
    <button type="submit" class="btn btn-primary">Registrar</button>
</form>

<!-- JS -->
<script>
let rowIndex = 1;

// AGREGAR FILA
document.getElementById('add-row').addEventListener('click', function () {

    const tbody = document.getElementById('table-body');

    const row = document.createElement('tr');

    row.innerHTML = `
        <td>
            <select name="destino_${rowIndex}" class="form-control">
                {% for d in destino %}
                    <option value="{{ d.id }}">{{ d.nom_fondo }}</option>
                {% endfor %}
            </select>
        </td>
        <td>
            <input type="text" name="descripcion_${rowIndex}" class="form-control">
        </td>
        <td>
            <button type="button" class="btn btn-danger remove-row">Eliminar</button>
        </td>
    `;

    tbody.appendChild(row);
    rowIndex++;
});

// ELIMINAR FILA (delegado → FIX IMPORTANTE)
document.getElementById('table-body').addEventListener('click', function (e) {
    if (e.target.classList.contains('remove-row')) {
        e.target.closest('tr').remove();
    }
});
</script>

{% endblock %}
