{% extends "biblioteca/layout.html" %}
{% load static %}

{% block content %}

<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet"/>

<h3>Generación de Informes</h3>

<button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalInforme">
    ➕ Generar Informe
</button>

<!-- ===================== MODAL ===================== -->
<div class="modal fade" id="modalInforme" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">

      <div class="modal-header bg-dark text-white">
        <h5>Generar Informe</h5>
        <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <form id="formInforme">
            {% csrf_token %}

            <div class="mb-3">
                <label>Cueanexo</label>
                <select name="cueanexo" id="cueanexo" class="form-select select2">
                    <option value="">Seleccione...</option>
                    {% for c in cueanexos_usuario %}
                        <option value="{{ c }}">{{ c }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label>Mes</label>
                <select name="meses" id="meses" class="form-select select2">
                    <option value="">Seleccione...</option>
                    <option>ABRIL</option>
                    <option>JULIO</option>
                    <option>NOVIEMBRE</option>
                </select>
            </div>

            <div class="mb-3">
                <label>Año</label>
                <select name="annos" id="annos" class="form-select select2">
                    <option value="">Seleccione...</option>
                    <option>2025</option>
                    <option>2026</option>
                    <option>2027</option>
                </select>
            </div>

            <div id="alertaDup" class="alert alert-danger d-none">
                Ya existe informe para ese período
            </div>

            <button class="btn btn-success w-100">Guardar</button>
        </form>

      </div>

    </div>
  </div>
</div>

<!-- ===================== JS ===================== -->

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>

// SELECT2
$('#modalInforme').on('shown.bs.modal', function () {
    $('.select2').select2({
        width: '100%',
        dropdownParent: $('#modalInforme')
    });
});

// CSRF
function getCookie(name) {
    let cookieValue = null;
    document.cookie.split(';').forEach(c => {
        c = c.trim();
        if (c.startsWith(name + '=')) {
            cookieValue = decodeURIComponent(c.substring(name.length + 1));
        }
    });
    return cookieValue;
}

const csrftoken = getCookie('csrftoken');


// ================= DUPLICADO =================
function verificarDuplicado() {
    let cue = cueanexo.value;
    let mes = meses.value;
    let anio = annos.value;

    if (!cue || !mes || !anio) return;

    fetch("{% url 'bibliotecas:verificar_informe_ajax' %}?cueanexo="+cue+"&meses="+mes+"&annos="+anio)
    .then(r => r.json())
    .then(data => {
        if (data.existe) {
            alertaDup.classList.remove("d-none");
        } else {
            alertaDup.classList.add("d-none");
        }
    });
}

cueanexo.onchange = verificarDuplicado;
meses.onchange = verificarDuplicado;
annos.onchange = verificarDuplicado;


// ================= SUBMIT =================
formInforme.onsubmit = function(e){
    e.preventDefault();

    let formData = new FormData(this);

    fetch("{% url 'bibliotecas:generar_informe' %}", {
        method: "POST",
        body: formData,
        headers: {
            "X-CSRFToken": csrftoken,
            "X-Requested-With": "XMLHttpRequest"
        }
    })
    .then(async r => {

        const text = await r.text();
        console.log("RESPUESTA SERVER:", text);

        if (!r.ok) {
            throw new Error("Error servidor");
        }

        return JSON.parse(text);
    })
    .then(data => {

        if (data.success){

            Swal.fire({
                icon: "success",
                title: "OK",
                text: data.message,
                timer: 1200,
                showConfirmButton: false
            });

            // 🔥 REDIRECCIÓN REAL
            setTimeout(() => {
                window.location.href = data.redirect_url;
            }, 1200);

        } else {
            Swal.fire("Error", data.message, "error");
        }

    })
    .catch(err => {
        Swal.fire("Error", err.message, "error");
    });
}

</script>

{% endblock %}
