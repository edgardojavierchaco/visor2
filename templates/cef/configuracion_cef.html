{% extends 'archivos/base/layout.html' %}
{% load static %}

{% block content %}
<style>
    .cef-config-wrapper { max-width: 1180px; margin: 0 auto; padding: 1.25rem 1rem 2.5rem; font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif; }
    .cef-config-title h1 { margin: 0; color: #1a4f8a; font-size: 1.45rem; font-weight: 800; }
    .cef-config-title p { margin: .25rem 0 1rem; color: #60758a; font-size: .9rem; font-weight: 600; }
    .cef-config-card { border: 1px solid #d8e4f2; border-radius: .85rem; background: #fff; box-shadow: 0 10px 24px rgba(18, 52, 86, .07); overflow: hidden; margin-bottom: 1rem; }
    .cef-config-card-header { padding: .85rem 1rem; background: linear-gradient(180deg, #ffffff 0%, #f4f8ff 100%); border-bottom: 1px solid #d8e4f2; color: #20364d; font-weight: 800; }
    .cef-config-card-body { padding: 1rem; color: #45607d; }
    @media (max-width: 768px) { .cef-config-wrapper { padding: .85rem .55rem 2rem; } }
</style>

<main class="cef-config-wrapper">
    <section class="cef-config-title">
        <h1>{{ title|default:"Configuracion CEF" }}</h1>
        <p>Entrada administrativa del modulo CEF.</p>
    </section>

    <section class="cef-config-card">
        <div class="cef-config-card-header">Estado actual</div>
        <div class="cef-config-card-body">
            La configuracion queda restringida a usuarios administradores. No hay ABM propio activo en este modulo.
        </div>
    </section>
</main>
{% endblock %}
