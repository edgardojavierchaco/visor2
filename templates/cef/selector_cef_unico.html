<section class="cef-card">
    <div class="cef-card-header">
        CEF activo de carga
    </div>
    <div class="cef-card-body">
        {% if cefs_cargables %}
            <form id="cefSelectorForm" class="cef-selector-form">
                {% csrf_token %}
                <div>
                    <label for="cefCueanexoActivo">Seleccionar CEF</label>
                    <select id="cefCueanexoActivo" name="cueanexo" class="form-select">
                        {% for cef in cefs_cargables %}
                            <option value="{{ cef.cueanexo }}" {% if cef.cueanexo == cef_cueanexo_activo %}selected{% endif %}>
                                {{ cef.cueanexo }}{% if cef.nom_est %} - {{ cef.nom_est }}{% endif %}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <button type="submit" class="btn btn-primary">
                        Cambiar CEF
                    </button>
                </div>

                <div id="cefSelectorMensaje" class="cef-muted"></div>
            </form>
        {% else %}
            <div class="alert alert-warning mb-0">
                No tenés CEF disponibles para carga.
            </div>
        {% endif %}
    </div>
</section>

<script>
(function () {
    const form = document.getElementById("cefSelectorForm");
    const select = document.getElementById("cefCueanexoActivo");
    const message = document.getElementById("cefSelectorMensaje");

    if (!form || !select) {
        return;
    }

    function getCsrfToken() {
        const input = form.querySelector("input[name='csrfmiddlewaretoken']");
        return input ? input.value : "";
    }

    form.addEventListener("submit", function (event) {
        event.preventDefault();

        const formData = new FormData();
        formData.append("cueanexo", select.value);

        if (message) {
            message.textContent = "Actualizando CEF activo...";
        }

        fetch("{% url 'cef:api_seleccionar_cef_carga' %}", {
            method: "POST",
            headers: {
                "X-CSRFToken": getCsrfToken(),
                "X-Requested-With": "XMLHttpRequest"
            },
            body: formData
        })
        .then(function (response) {
            if (!response.ok) {
                throw new Error("No se pudo actualizar el CEF activo.");
            }
            return response.json();
        })
        .then(function () {
            window.location.reload();
        })
        .catch(function () {
            if (message) {
                message.textContent = "No se pudo actualizar el CEF activo.";
            }
        });
    });
})();
</script>
