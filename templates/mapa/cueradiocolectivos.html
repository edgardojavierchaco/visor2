{% extends 'dashboard/body.html' %}
{% load static %}

{% block content %}

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />

<style>
#map-container { display:flex; height:85vh; }

#sidebar{
    width:320px;
    background:#1e293b;
    color:white;
    padding:15px;
}

#map{ flex:1; }

.legend{
    background:white;
    padding:10px;
    border-radius:6px;
    max-height:250px;
    overflow:auto;
    font-size:13px;
}

.legend-item{
    cursor:pointer;
    display:flex;
    align-items:center;
    margin-bottom:5px;
}

.legend-item:hover{
    background:#f0f0f0;
}
</style>

<div id="map-container">

<!-- SIDEBAR -->
<div id="sidebar">
    <h5>🚌 Colectivos</h5>

    <form id="filtroForm">
        <label>Cueanexo</label>
        <input type="text" id="cueInput" class="form-control">

        <label class="mt-2">Radio: <span id="radioValue">1000</span> m</label>
        <input type="range" id="radioSlider" min="100" max="6000" step="100" value="1000">

        <div class="mt-3">
            <button type="submit" class="btn btn-success w-100">Aplicar</button>
            <button type="button" onclick="resetForm()" class="btn btn-warning w-100 mt-2">Limpiar</button>
        </div>
    </form>
</div>

<div id="map"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

<script>
let map = L.map('map').setView([-27.45, -58.98], 13);
let markersLayer = L.layerGroup().addTo(map);
let legendControl = null;
let lineLayers = {};
let activeLines = {};

/* ================= 🔥 CAPAS PRO ================= */

// Carto (principal)
let claro = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png');
let oscuro = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');

// Satélite
let satelite = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
);

// Híbrido (satélite + labels)
let labels = L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png'
);

let hibrido = L.layerGroup([satelite, labels]);

// Fallback automático a OSM si falla Carto
claro.on('tileerror', () => {
    console.warn("⚠️ Carto falló → usando OSM");
    claro.setUrl('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
});

// Activar capa inicial
claro.addTo(map);

L.control.layers({
    "Claro": claro,
    "Oscuro": oscuro,
    "Satélite": satelite,
    "Híbrido": hibrido
}).addTo(map);

/* ================= ICONO ESCUELA ================= */
let schoolIcon = L.icon({
    iconUrl: "{% static 'img/iconblue.png' %}",
    iconSize: [30, 40],
    iconAnchor: [15, 40]
});

/* ================= SLIDER ================= */
const slider = document.getElementById("radioSlider");
const radioValue = document.getElementById("radioValue");

slider.oninput = () => radioValue.innerText = slider.value;

/* ================= FETCH ================= */
document.getElementById("filtroForm").addEventListener("submit", function(e){
    e.preventDefault();

    fetch("{% url 'mapas:colectivos' %}", {
        method: "POST",
        headers: { 
            "X-CSRFToken": getCSRF()
        },
        body: new URLSearchParams({
            Cueanexo: cueInput.value,
            Radio: slider.value
        })
    })
    .then(r => r.json())
    .then(data => renderMap(data));
});

/* ================= CSRF ================= */
function getCSRF(){
    return document.cookie.split('; ')
        .find(row => row.startsWith('csrftoken'))
        ?.split('=')[1];
}

/* ================= RENDER ================= */
function renderMap(data){

    markersLayer.clearLayers();
    Object.values(lineLayers).forEach(l => map.removeLayer(l));

    lineLayers = {};
    activeLines = {};

    let colors = {};
    let palette = ["#e6194b","#3cb44b","#ffe119","#4363d8","#f58231","#911eb4","#46f0f0"];
    let idx = 0;

    data.markers.forEach(m => {

        if (m.tipo === "establecimiento") {

            L.marker([m.lat, m.lng], {icon: schoolIcon})
                .bindPopup(`<b>${m.nombre}</b>`)
                .addTo(markersLayer);

            return;
        }

        if (!colors[m.linea]) {
            colors[m.linea] = palette[idx % palette.length];
            idx++;
        }

        let color = colors[m.linea];

        if (!lineLayers[m.linea]) {
            lineLayers[m.linea] = L.layerGroup().addTo(map);
            activeLines[m.linea] = true;
        }

        let icon = L.divIcon({
            html: `<i class="fas fa-bus" style="color:${color}; font-size:18px;"></i>`,
            className: ''
        });

        let marker = L.marker([m.lat, m.lng], {icon: icon});

        marker.bindPopup(`
            <b>Línea:</b> ${m.linea}<br>
            <b>Dirección:</b> ${m.direccion}
        `);

        lineLayers[m.linea].addLayer(marker);
    });

    map.setView([data.center.lat, data.center.lng], 14);

    createLegend(colors);
}

/* ================= LEYENDA ================= */
function createLegend(colors){

    if (legendControl) map.removeControl(legendControl);

    legendControl = L.control({position:"topright"});

    legendControl.onAdd = function(){

        let div = L.DomUtil.create("div","legend");

        div.innerHTML = "<b>Líneas</b><br>";

        for (let linea in colors){

            let item = document.createElement("div");
            item.className = "legend-item";

            item.innerHTML = `
                <i class="fas fa-bus" style="color:${colors[linea]}; margin-right:5px;"></i>
                ${linea}
            `;

            item.onclick = () => toggleLine(linea, item);

            div.appendChild(item);
        }

        return div;
    };

    legendControl.addTo(map);
}

/* ================= TOGGLE ================= */
function toggleLine(linea, el){

    if(activeLines[linea]){
        map.removeLayer(lineLayers[linea]);
        el.style.opacity = "0.3";
    }else{
        map.addLayer(lineLayers[linea]);
        el.style.opacity = "1";
    }

    activeLines[linea] = !activeLines[linea];
}

/* ================= RESET ================= */
function resetForm(){

    document.getElementById("filtroForm").reset();
    radioValue.innerText = 1000;

    markersLayer.clearLayers();

    Object.values(lineLayers).forEach(l => map.removeLayer(l));

    if (legendControl){
        map.removeControl(legendControl);
        legendControl = null;
    }

    lineLayers = {};
    activeLines = {};

    map.setView([-27.45, -58.98], 13);
}
</script>

{% endblock %}
