.filtros-grid{

/* cards */

}

.filtro-card:hover{

.hidden{

.is-invalid{

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="{% static 'js/funciones.js' %}"></script>

<script>

function openModal(){
const modal=new bootstrap.Modal(document.getElementById('myModal'));
modal.show();
}

function toggleDropdown(id){

const input=document.getElementById(id+'Dropdown');
const checkbox=document.getElementById('SwitchCheck'+id);

if(checkbox.checked){

input.classList.remove('hidden');
input.disabled=false;

if(id==='Region'){
avisoregion();
}

}else{

input.classList.add('hidden');
input.disabled=true;

}

actualizarContador();

}

function actualizarContador(){

const activos=document.querySelectorAll('.form-check-input:checked').length;

document.getElementById('contadorFiltros').innerText=activos;

}

function resetForm(){

const form=document.querySelector('form');

form.reset();

document.querySelectorAll('.form-select,.form-control').forEach(el=>{
el.classList.add('hidden');
el.disabled=true;
});

actualizarContador();

}

function validateCueanexo(input){

const cueanexo=input.value.trim();

const isValid=/^22\d{7}$/.test(cueanexo);

if(!isValid){

alert_jqueryvalidacion();

}else{

input.classList.remove('is-invalid');
input.setCustomValidity('');

}

}

document.getElementById("cerrarBtn").addEventListener("click",function(event){

event.preventDefault();

window.history.go(-1);

});

</script>
