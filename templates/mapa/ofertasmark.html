{% extends 'dashboard/body.html' %}
{% load static %}

{% block content %}
<div class="container-fluid py-3">
    {% block content_header %}
    <div class="content-header mb-3">
        <div class="row">
            <div class="col-sm-6">
                <h1 class="m-0 text-dark">Ubicación Geográfica de Unidades de Servicio</h1>
            </div>
            <div class="col-sm-6 text-end">
                <ol class="breadcrumb float-sm-right">
                    <li class="breadcrumb-item"><a href="{% url 'dash:portada' %}">Regresar</a></li>
                    <li class="breadcrumb-item"><a href="{{ list_url }}">{{ entity }}</a></li>
                </ol>
            </div>
        </div>
    </div>
    {% endblock %}

    <!-- Contenedor del mapa -->
    <div id="map-container" class="mb-4">
        <div id="map"></div>
    </div>

    <!-- Contenedor de la tabla -->
    <div id="table-container">
        <table id="marker-table" class="table table-striped table-bordered display nowrap" style="width:100%">
            <thead>
                <tr>
                    <th>Cueanexo</th>
                    <th>Establecimiento</th>
                    <th>Ofertas</th>
                    <th>Ámbito</th>
                    <th>Sector</th>
                    <th>Región Educativa</th>
                    <th>Calle</th>
                    <th>Número</th>
                    <th>Localidad</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<!-- Estilos específicos -->
<style>
#map-container { position: relative; }
#map { height: 450px; width: 100%; border-radius: 8px; }
</style>

<!-- Librerías externas (una sola versión de cada) -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.4.1/MarkerCluster.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.4.1/MarkerCluster.Default.css"/>
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css"/>
<link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.0.1/css/buttons.bootstrap5.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

<script src="https://code.jquery.com/jquery-3.7.0.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.4.1/leaflet.markercluster.js" defer></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js" defer></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js" defer></script>
<script src="https://cdn.datatables.net/buttons/2.0.1/js/dataTables.buttons.min.js" defer></script>
<script src="https://cdn.datatables.net/buttons/2.0.1/js/buttons.bootstrap5.min.js" defer></script>
<script src="https://cdn.datatables.net/buttons/2.0.1/js/buttons.html5.min.js" defer></script>
<script src="https://cdn.datatables.net/buttons/2.0.1/js/buttons.print.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js" defer></script>

<script defer>
document.addEventListener('DOMContentLoaded', function(){

    // Parseamos los datos desde el backend
    const markersData = JSON.parse('{{ data_json|escapejs }}');

    // Inicializamos el mapa
    const map = L.map('map');
    const bounds = L.latLngBounds();
    const markerClusterGroup = L.markerClusterGroup();

    // Capas base
    const openStreetMap = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: 'Map data &copy; <a href="https://www.openstreetmap.org/">OpenStreetMap</a> contributors',
        maxZoom: 18
    }).addTo(map);

    const esriSatellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Tiles &copy; Esri',
        maxZoom: 18
    });

    L.control.layers({"Mosaico": openStreetMap, "Satélite": esriSatellite}, null, {collapsed:true}).addTo(map);
    L.control.scale({position:'bottomleft', imperial:false}).addTo(map);

    // Colores por región
    const regionColors = {
        'R.E. 1': 'orange', 'R.E. 2': 'blue', 'R.E. 3': 'violet',
        'R.E. 4-B': 'red', 'R.E. 4-A':'green', 'R.E. 5': 'orange',
        'R.E. 6': 'blue', 'R.E. 7': 'violet', 'R.E. 8-A': 'red',
        'R.E. 8-B':'green', 'R.E. 9': 'orange', 'R.E. 10-A': 'red',
        'R.E. 10-B': 'blue', 'R.E. 10-C': 'green'
    };

    const getMarkerColor = region => regionColors[region] || 'gray';

    // DataTables: construimos data array
    const tableData = [];

    markersData.forEach(m => {
        const [cueanexo, lat, lng, nom_est, oferta, ambito, sector, region_loc, calle, numero, localidad] = m;

        // Creamos marcador en mapa
        if(lat && lng){
            const color = getMarkerColor(region_loc);
            const marker = L.marker([lat, lng], {
                icon: L.divIcon({
                    className: 'custom-marker',
                    html: `<i class="fas fa-map-marker-alt" style="color:${color};font-size:24px;" title="${nom_est}"></i>`,
                    iconSize: [24,24],
                    iconAnchor: [12,24]
                })
            }).bindPopup(
                `<strong>Cueanexo:</strong> <a href="#" onclick="filterTable('${cueanexo}','${oferta}')" title="Ver detalle del Cueanexo">${cueanexo}</a><br>` +
                `<strong>Establecimiento:</strong> ${nom_est}<br>` +
                `<strong>Ofertas:</strong> ${oferta}<br>` +
                `<strong>Ámbito:</strong> ${ambito}<br>` +
                `<strong>Sector:</strong> ${sector}<br>` +
                `<strong>Región:</strong> ${region_loc}<br>` +
                `<strong>Calle:</strong> ${calle} Nro ${numero} - ${localidad}`
            );
            markerClusterGroup.addLayer(marker);
            bounds.extend(marker.getLatLng());
        }

        // Agregamos fila a DataTables
        tableData.push([cueanexo, nom_est, oferta, ambito, sector, region_loc, calle, numero, localidad]);
    });

    map.addLayer(markerClusterGroup);
    map.fitBounds(bounds);

    // Inicializamos DataTables
    $('#marker-table').DataTable({
        data: tableData,
        columns: [
            { data: 0, render: (d,r)=>`<a href="#" onclick="filterTable('${d}','${r[2]}')">${d}</a>` },
            { data: 1 }, { data: 2 }, { data: 3 }, { data: 4 }, { data: 5 },
            { data: 6 }, { data: 7 }, { data: 8 }
        ],
        responsive: true,
        autoWidth: false,
        dom: '<"top"lBf>rt<"bottom"ip>',
        buttons: [
            { extend:'excel', className:'btn btn-secondary', text:'<i class="fas fa-file-excel"></i>', title:'Mapa_Unidades' },
            { extend:'csv', className:'btn btn-secondary', text:'<i class="fas fa-file-csv"></i>', title:'Mapa_Unidades' },
            { extend:'pdf', className:'btn btn-secondary', text:'<i class="fas fa-file-pdf"></i>', title:'Mapa_Unidades' },
            { extend:'print', className:'btn btn-secondary', text:'<i class="fas fa-print"></i>', title:'Mapa_Unidades' }
        ],
        language: { url: "https://cdn.datatables.net/plug-ins/2.0.3/i18n/es-AR.json" }
    });

    // Función de filtrado
    window.filterTable = (cueanexo, oferta) => {
        window.location.href = `/map/listados/?cueanexo=${cueanexo}&oferta=${oferta}`;
    };
});
</script>
{% endblock %}
