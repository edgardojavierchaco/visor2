{% extends 'dashboard/body.html' %}
{% load static %}

{% block content %}

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />

<style>
#map-container { display:flex; height:85vh; }

#sidebar{
    width:320px;
    background:#1e293b;
    color:white;
    padding:15px;
}

#map{ flex:1; }

.legend{
    background:white;
    padding:10px;
    border-radius:6px;
    max-height:300px;
    overflow:auto;
    font-size:13px;
    box-shadow:0 2px 6px rgba(0,0,0,0.3);
}

.legend-title{
    font-weight:bold;
    margin-bottom:5px;
}

.legend-item{
    cursor:pointer;
    display:flex;
    align-items:center;
    margin-bottom:6px;
}

.legend-item:hover{
    background:#f1f1f1;
}

.legend-item img{
    margin-right:6px;
}
</style>

<div id="map-container">

<!-- SIDEBAR -->
<div id="sidebar">
    <h5>🚓 Comisarías</h5>

    <form id="filtroForm">
        <label>Cueanexo</label>
        <input type="text" id="cueInput" class="form-control">

        <label class="mt-2">Radio: <span id="radioValue">1000</span> m</label>
        <input type="range" id="radioSlider" min="100" max="6000" step="100" value="1000">

        <div class="mt-3">
            <button type="submit" class="btn btn-success w-100">Aplicar</button>
            <button type="button" onclick="resetForm()" class="btn btn-warning w-100 mt-2">Limpiar</button>
        </div>
    </form>
</div>

<div id="map"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

<script>
let map = L.map('map').setView([-27.45,-58.98],13);
let markersLayer = L.layerGroup().addTo(map);
let legendControl = null;
let typeLayers = {};
let activeTypes = {};

/* ================= 🔥 CAPAS PRO ================= */

// Carto
let claro = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png');
let oscuro = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');

// Satélite
let satelite = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
);

// Híbrido
let labels = L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png'
);

let hibrido = L.layerGroup([satelite, labels]);

// Fallback automático
claro.on('tileerror', () => {
    console.warn("⚠️ Carto falló → usando OSM");
    claro.setUrl('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
});

claro.addTo(map);

L.control.layers({
    "Claro": claro,
    "Oscuro": oscuro,
    "Satélite": satelite,
    "Híbrido": hibrido
}).addTo(map);

/* ================= ICONOS ================= */

let schoolIcon = L.icon({
    iconUrl: "{% static 'img/iconblue.png' %}",
    iconSize: [35,40],
    iconAnchor: [17,40]
});

let policeIcon = L.icon({
    iconUrl: "{% static 'img/policiachaco.png' %}",
    iconSize: [40,45],
    iconAnchor: [20,45],
    popupAnchor: [0,-40]
});

/* ================= SLIDER ================= */
radioSlider.oninput = () => radioValue.innerText = radioSlider.value;

/* ================= FETCH ================= */
filtroForm.addEventListener("submit", e=>{
    e.preventDefault();

    fetch("{% url 'mapas:api_comisarias' %}",{
        method:"POST",
        headers:{ "X-CSRFToken": getCSRF() },
        body:new URLSearchParams({
            Cueanexo: cueInput.value,
            Radio: radioSlider.value
        })
    })
    .then(r=>{
        if(!r.ok) throw new Error("HTTP "+r.status);
        return r.json();
    })
    .then(draw)
    .catch(err=>console.error(err));
});

/* ================= CSRF ================= */
function getCSRF(){
    return document.cookie.split('; ')
        .find(r=>r.startsWith('csrftoken'))
        ?.split('=')[1];
}

/* ================= RENDER ================= */
function draw(data){

    markersLayer.clearLayers();
    Object.values(typeLayers).forEach(l=>map.removeLayer(l));

    typeLayers={};
    activeTypes={};

    data.markers.forEach(m=>{

        if(m.tipo==="establecimiento"){

            L.marker([m.lat,m.lng],{icon:schoolIcon})
            .bindPopup(`<b>${m.nombre}</b>`)
            .addTo(markersLayer);

        }else{

            let key = m.nombre;

            if(!typeLayers[key]){
                typeLayers[key]=L.layerGroup().addTo(map);
                activeTypes[key]=true;
            }

            let mk = L.marker([m.lat,m.lng],{icon:policeIcon});

            mk.bindPopup(`
                <b>Comisaría:</b> ${m.nombre}<br>
                <b>Dirección:</b> ${m.direccion}<br>
                <b>Tel:</b> ${m.telefono||'N/D'}
            `);

            typeLayers[key].addLayer(mk);
        }
    });

    map.setView([data.center.lat,data.center.lng],14);

    createLegend();
}

/* ================= LEYENDA ================= */
function createLegend(){

    if(legendControl) map.removeControl(legendControl);

    legendControl=L.control({position:"topright"});

    legendControl.onAdd=function(){

        let div=L.DomUtil.create("div","legend");

        div.innerHTML="<div class='legend-title'>Comisarías</div>";

        Object.keys(typeLayers).forEach(name=>{

            let item=document.createElement("div");
            item.className="legend-item";

            item.innerHTML=`
                <img src="{% static 'img/policiachaco.png' %}" width="18">
                ${name}
            `;

            item.onclick=()=>toggleLayer(name,item);

            div.appendChild(item);
        });

        return div;
    };

    legendControl.addTo(map);
}

/* ================= TOGGLE ================= */
function toggleLayer(type,el){

    if(activeTypes[type]){
        map.removeLayer(typeLayers[type]);
        el.style.opacity=0.3;
    }else{
        map.addLayer(typeLayers[type]);
        el.style.opacity=1;
    }

    activeTypes[type]=!activeTypes[type];
}

/* ================= RESET ================= */
function resetForm(){

    filtroForm.reset();
    radioValue.innerText=1000;

    markersLayer.clearLayers();

    Object.values(typeLayers).forEach(l=>map.removeLayer(l));

    if(legendControl){
        map.removeControl(legendControl);
        legendControl=null;
    }

    typeLayers={};
    activeTypes={};

    map.setView([-27.45,-58.98],13);
}
</script>

{% endblock %}
