{% extends "consultasge/layout.html" %}
{% block content %}

<div class="container mt-4">
    <h2>Nueva Consulta</h2>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="mb-3">
            <label>Asunto</label>
            {{ form.asunto }}
        </div>

        <div class="mb-3">
            <label>Categoría</label>
            {{ form.categoria }}
        </div>

        <div class="mb-3">
            {{ form.mensaje.label_tag }}
            {{ form.mensaje }}
        </div>

        <div class="mb-3">
            <input type="file" name="archivos" id="input-archivos" multiple class="form-control" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx">
            <div id="preview-archivos" class="d-flex flex-wrap gap-2 mt-2"></div>
            <div id="drop-zone" class="border rounded p-3 text-center text-muted mt-2">
                Arrastrá imágenes aquí o pegá capturas con <strong>Ctrl + V</strong>
            </div>
        </div>

        <button type="submit" class="btn btn-primary">
            Enviar consulta
        </button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
const inputArchivos = document.getElementById("input-archivos");
const preview = document.getElementById("preview-archivos");
const dropZone = document.getElementById("drop-zone");
let archivos = [];
const MAX_SIZE = 5 * 1024 * 1024; // 5MB

function actualizarInput(){
    const dt = new DataTransfer();
    archivos.forEach(file => dt.items.add(file));
    inputArchivos.files = dt.files;
}

function eliminarArchivo(index){
    archivos.splice(index,1);
    renderPreview();
}

function renderPreview(){
    preview.innerHTML = "";
    archivos.forEach((file,index)=>{
        const reader = new FileReader();
        reader.onload = function(e){
            const div = document.createElement("div");
            div.className = "position-relative border rounded";
            div.style.width = "120px";
            div.innerHTML = `
                <img src="${e.target.result}" style="width:120px;height:90px;object-fit:cover;border-radius:4px;">
                <button type="button" class="btn btn-sm btn-danger position-absolute top-0 end-0" onclick="eliminarArchivo(${index})">✕</button>
            `;
            preview.appendChild(div);
        };
        reader.readAsDataURL(file);
    });
    actualizarInput();
}

async function comprimirImagen(file){
    return new Promise(resolve=>{
        const reader = new FileReader();
        reader.onload = function(e){
            const img = new Image();
            img.onload = function(){
                const canvas = document.createElement("canvas");
                const ctx = canvas.getContext("2d");
                const MAX_WIDTH = 1600;
                let width = img.width;
                let height = img.height;
                if(width>MAX_WIDTH){ height*=MAX_WIDTH/width; width=MAX_WIDTH; }
                canvas.width = width; canvas.height = height;
                ctx.drawImage(img,0,0,width,height);
                canvas.toBlob(function(blob){
                    const compressedFile = new File([blob], file.name.replace(/\.[^/.]+$/,"")+".jpg", {type:"image/jpeg"});
                    resolve(compressedFile);
                },"image/jpeg",0.75);
            };
            img.src=e.target.result;
        };
        reader.readAsDataURL(file);
    });
}

async function procesarArchivo(file){
    if(file.size>MAX_SIZE){
        Swal.fire({icon:"error",title:"Archivo demasiado grande",text:"Máximo 5MB"});
        return;
    }
    if(file.type.startsWith("image/")){
        file = await comprimirImagen(file);
    }
    archivos.push(file);
    renderPreview();
}

inputArchivos.addEventListener("change", async function(){
    for(let f of this.files){ await procesarArchivo(f); }
});

dropZone.addEventListener("dragover", e=>{e.preventDefault(); dropZone.classList.add("bg-light");});
dropZone.addEventListener("dragleave", e=>{dropZone.classList.remove("bg-light");});
dropZone.addEventListener("drop", async e=>{
    e.preventDefault(); dropZone.classList.remove("bg-light");
    for(let f of e.dataTransfer.files){ await procesarArchivo(f); }
});

document.addEventListener("paste", async function(event){
    const items = event.clipboardData.items;
    for(let i=0;i<items.length;i++){
        if(items[i].type.indexOf("image")!==-1){
            const blob = items[i].getAsFile();
            await procesarArchivo(blob);
            Swal.fire({icon:"success",title:"Captura pegada",timer:1200,showConfirmButton:false});
        }
    }
});
</script>

{% endblock %}
