<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="utf-8">
<title>Sistema de Consultas - Gestor</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet"
>

</head>


<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container-fluid">

<a class="navbar-brand"
href="{% url 'consultasge:gestor_consultas' %}">

Sistema de Consultas - Gestor Regional

</a>


<div class="d-flex align-items-center">

<a href="{% url 'consultasge:gestor_consultas' %}"
class="btn btn-outline-light btn-sm me-3">

Consultas

{% if pendientes_count %}
<span class="badge bg-danger ms-1">
{{ pendientes_count }}
</span>
{% endif %}

</a>


<span class="text-white me-3">
{{ request.user.username }}
</span>

</div>

</div>

</nav>


<div class="container mt-4">

{% block content %}
{% endblock %}

</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>


{% if messages %}
<script>

document.addEventListener("DOMContentLoaded", function () {

let mensajes = [
{% for message in messages %}
{
icon: "{% if message.tags == 'success' %}success{% elif message.tags == 'error' %}error{% elif message.tags == 'warning' %}warning{% else %}info{% endif %}",
title: "{{ message|escapejs }}"
},
{% endfor %}
];

function mostrarMensaje(i){
if(i >= mensajes.length) return;

Swal.fire({
icon: mensajes[i].icon,
title: mensajes[i].title,
confirmButtonText: "Aceptar"
}).then(() => {
mostrarMensaje(i + 1);
});

}

mostrarMensaje(0);

});

</script>
{% endif %}


</body>
</html>
