{% extends "consultasge/layout.html" %}
{% block content %}

<div class="container mt-4">

<div class="d-flex justify-content-between mb-3">
    <h2>Mis consultas</h2>
    <a href="{% url 'consultasge:consultas_nueva' %}" class="btn btn-primary">
        <i class="bi bi-plus"></i> Nueva
    </a>
</div>

<table class="table table-hover align-middle shadow-sm">
<thead class="table-light text-center">
<tr>
<th>Fecha</th>
<th>Asunto</th>
<th>Estado</th>
<th></th>
</tr>
</thead>

<tbody>
{% for c in consultas %}
<tr>
<td class="text-center">{{ c.fecha_creacion|date:"d/m/Y H:i" }}</td>

<td>
    <strong>{{ c.asunto }}</strong>
</td>

<td class="text-center">
<span class="badge
    {% if c.estado == 'pendiente' %}bg-danger
    {% elif c.estado == 'en_proceso' %}bg-warning text-dark
    {% elif c.estado == 'respondida' %}bg-success
    {% elif c.estado == 'cerrada' %}bg-secondary
    {% endif %}
">
    {{ c.get_estado_display }}
</span>
</td>

<td class="text-center">
<a href="{% url 'consultasge:consulta_detalle' c.id %}"
class="btn btn-sm btn-primary">
Ver
</a>
</td>

</tr>
{% empty %}
<tr>
<td colspan="4" class="text-center text-muted py-4">
No tenés consultas aún
</td>
</tr>
{% endfor %}
</tbody>
</table>

</div>

{% endblock %}
