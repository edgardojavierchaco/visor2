<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<title>Sistema de Consultas</title>

<script src="https://unpkg.com/htmx.org@1.9.10"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet"
>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container-fluid">

<a class="navbar-brand" href="/consultas/">
Sistema de Consultas Directivos - SGE
</a>

<div>

<a class="btn btn-light" href="/director/">Inicio</a>

<a class="btn btn-light" href="/consultasge/nueva/">Nueva consulta</a>

<a class="btn btn-light" href="/consultasge/mis/">Mis consultas</a>

<a class="btn btn-light" href="/consultasge/">Dashboard</a>

</div>

</div>

</nav>

<div class="container mt-4">

{% block content %}
{% endblock %}

</div>


{% if messages %}
<script>

document.addEventListener("DOMContentLoaded", function () {

{% for message in messages %}

Swal.fire({
    icon: "{% if message.tags == 'error' %}error{% elif message.tags == 'warning' %}warning{% elif message.tags == 'success' %}success{% else %}info{% endif %}",
    title: "{{ message|escapejs }}",
    confirmButtonText: "Aceptar"
});

{% endfor %}

});

</script>
{% endif %}

</body>

</html>
