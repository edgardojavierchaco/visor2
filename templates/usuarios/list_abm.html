<!-- templates/usuarios/list_abm.html -->

{% extends "archivos/base/dashboard.html" %}

{% block head %}
<!-- DataTables CSS -->
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap4.min.css">
{% endblock %}

{% block content %}

<div class="container-fluid">

    <h3 class="mb-3">👥 {{ titulo }}</h3>

    <!-- =========================
    🔎 FILTROS
    ========================== -->
    <div class="card shadow-sm mb-3">
        <div class="card-body">

            <div class="row g-2">

                <div class="col-md-4">
                    <input type="text"
                           id="username"
                           class="form-control"
                           placeholder="Buscar username...">
                </div>

                <div class="col-md-3">
                    <select id="estado" class="form-select">
                        <option value="">Todos</option>
                        <option value="activo">Activos</option>
                        <option value="inactivo">Inactivos</option>
                    </select>
                </div>

                <div class="col-md-2">
                    <button id="btnBuscar" class="btn btn-primary w-100">
                        🔍 Buscar
                    </button>
                </div>

                <div class="col-md-2">
                    <button id="btnReset" class="btn btn-secondary w-100">
                        ♻️ Limpiar
                    </button>
                </div>

            </div>

        </div>
    </div>

    <!-- =========================
    📊 TABLA
    ========================== -->
    <div class="card shadow-sm">
        <div class="card-body">

            <table id="tablaUsuarios" class="table table-striped table-hover w-100">
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Rol</th>
                        <th>Nivel Acceso</th>
                        <th>Estado</th>
                    </tr>
                </thead>
            </table>

        </div>
    </div>

</div>

{% endblock %}

{% block scripts %}
<!-- DataTables JS -->
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap4.min.js"></script>

<script>
window.URL_USUARIOS_AJAX = "{% url 'usuarios:usuarios_list_ajax' %}";

document.addEventListener("DOMContentLoaded", function () {

    // 🔥 Verificación de DataTables
    if (typeof $.fn.DataTable === "undefined") {
        console.error("❌ DataTables NO está cargado. Revisa CDN o base.html.");
        return;
    }

    // 🔥 Inicialización única
    if (!window.tableInitialized) {

        window.tableInitialized = true;

        let table = $('#tablaUsuarios').DataTable({
            processing: true,
            serverSide: true,
            responsive: true,
            ajax: {
                url: window.URL_USUARIOS_AJAX,
                data: function (d) {
                    d.username = $('#username').val();
                    d.estado = $('#estado').val();
                }
            },
            columns: [
                { data: 0 },
                { data: 1 },
                { data: 2 },
                { data: 3 }
            ],
            language: {
                url: "https://cdn.datatables.net/plug-ins/1.13.6/i18n/es-ES.json"
            },
            pageLength: 10,
            order: [[0, "asc"]]
        });

        // 🔍 Buscar
        $('#btnBuscar').on('click', function () {
            table.ajax.reload();
        });

        // ♻️ Reset
        $('#btnReset').on('click', function () {
            $('#username').val('');
            $('#estado').val('');
            table.ajax.reload();
        });

        // 🔥 ENTER para buscar
        $('#username').on('keypress', function (e) {
            if (e.which === 13) {
                table.ajax.reload();
            }
        });

    }

});
</script>
{% endblock %}
