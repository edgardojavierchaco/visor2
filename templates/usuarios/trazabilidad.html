<!-- templates/usuarios/trazabilidad.html -->

{% extends "archivos/base/dashboard.html" %}

{% block content %}

<div class="container-fluid">

    <h3 class="mb-3">🛡️ Trazabilidad de Usuarios</h3>

    <!-- ===================== -->
    <!-- 🔍 FILTROS -->
    <!-- ===================== -->
    <div class="row mb-3">

        <div class="col-md-3">
            <input type="text" id="filtroUsuario" class="form-control" placeholder="Usuario">
        </div>

        <div class="col-md-2">
            <select id="filtroAccion" class="form-select select2">
                <option value="">Todas</option>
                <option value="login">Login</option>
                <option value="logout">Logout</option>
                <option value="view">Vista</option>
                <option value="create">Alta</option>
                <option value="update">Modificación</option>
                <option value="delete">Baja</option>
            </select>
        </div>

        <div class="col-md-2">
            <input type="date" id="desde" class="form-control">
        </div>

        <div class="col-md-2">
            <input type="date" id="hasta" class="form-control">
        </div>

    </div>

    <!-- ===================== -->
    <!-- 📊 TABLA -->
    <!-- ===================== -->
    <table id="tablaLogs" class="table table-bordered table-striped w-100">
        <thead class="table-dark">
            <tr>
                <th>Fecha</th>
                <th>Usuario</th>
                <th>Acción</th>
                <th>IP</th>
                <th>Ruta</th>
            </tr>
        </thead>
        <tbody></tbody> <!-- 🔥 CLAVE -->
    </table>

</div>

{% endblock %}

{% block scripts %}

<!-- ========================= -->
<!-- 📦 CSS -->
<!-- ========================= -->
<link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/css/select2.min.css" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" rel="stylesheet">

<!-- ========================= -->
<!-- 📦 JS (ORDEN IMPORTANTE) -->
<!-- ========================= -->
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/js/select2.min.js"></script>

<!-- ========================= -->
<!-- 🎨 ESTILOS EXTRA -->
<!-- ========================= -->
<style>
.select2-container--bootstrap-5 .select2-selection {
    min-height: 38px;
    padding: 4px;
}
</style>

<!-- ========================= -->
<!-- 🚀 SCRIPT -->
<!-- ========================= -->
<script>
$(document).ready(function(){

    console.log("🔥 INIT TRAZABILIDAD");

    // SELECT2 (defensivo)
    if ($.fn.select2) {
        $('.select2').select2({
            theme: 'bootstrap-5',
            width: '100%'
        });
    }

    // 💣 EVITAR DOBLE INICIALIZACIÓN
    if ($.fn.DataTable.isDataTable('#tablaLogs')) {
        $('#tablaLogs').DataTable().destroy();
    }

    // DATATABLE
    let table = $('#tablaLogs').DataTable({

        processing: true,
        pageLength: 25,
        destroy: true, // 🔥 extra seguridad

        ajax: {
            url: "/usua/trazabilidad/data/",
            dataSrc: function(json){
                return json.data || [];
            },
            data: function(d){
                d.username = $('#filtroUsuario').val();
                d.accion = $('#filtroAccion').val();
                d.desde = $('#desde').val();
                d.hasta = $('#hasta').val();
            },
            error: function(xhr){
                console.log("❌ ERROR AJAX:", xhr.responseText);
            }
        },

        columns: [
            {data: 'fecha', defaultContent: ''},

            {
                data: 'username',
                defaultContent: '',
                render: function(data){
                    return `<strong>${data}</strong>`;
                }
            },

            {
                data: 'accion',
                render: function(data){

                    let color = '';
                    let texto = data;

                    switch(data){
                        case 'login':
                            color = 'success';
                            texto = 'Login';
                            break;
                        case 'logout':
                            color = 'primary';
                            texto = 'Logout';
                            break;
                        case 'view':
                            color = 'secondary';
                            texto = 'Vista';
                            break;
                        case 'create':
                            color = 'success';
                            texto = 'Alta';
                            break;
                        case 'update':
                            color = 'warning';
                            texto = 'Modificación';
                            break;
                        case 'delete':
                            color = 'danger';
                            texto = 'Baja';
                            break;
                        default:
                            color = 'dark';
                            texto = data;
                    }

                    return `<span class="badge bg-${color}">${texto}</span>`;
                }
            },

            {
                data: 'ip',
                defaultContent: '-',
                render: function(data){
                    return `<small class="text-muted">${data || '-'}</small>`;
                }
            },

            {
                data: 'path',
                defaultContent: '',
                render: function(data){
                    return `<code>${data}</code>`;
                }
            }
        ],

        order: [[0, 'desc']],
        // 🔥 ESPAÑOL
        language: {
            url: "https://cdn.datatables.net/plug-ins/1.13.6/i18n/es-ES.json"
        }

    });

    // FILTROS
    $('#filtroUsuario, #filtroAccion, #desde, #hasta')
        .off('keyup change') // 🔥 evita duplicación de eventos
        .on('keyup change', function(){
            table.ajax.reload();
        });

});
</script>

{% endblock %}
