<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carga de Alumno</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

    <style>
      body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #eef2ff, #ffffff); min-height: 100vh; padding: 30px 15px; }
      .card { border-radius: 18px; border: none; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12); overflow: hidden; margin-top: 20px; }
      .card-header { background: linear-gradient(90deg, #0066cc, #004a99); color: white; padding: 24px; text-align: center; }
      h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0; letter-spacing: -0.5px; }
      h5 { font-size: 1.25rem; font-weight: 600; color: #004a99; margin-top: 1.5rem; margin-bottom: 1.2rem; border-bottom: 2px solid #eef2ff; padding-bottom: 10px; }
      
      .btn-custom { border-radius: 10px; padding: 14px 20px; font-size: 1.05rem; font-weight: 600; transition: all 0.2s ease; }
      
      .card-body p { margin-bottom: 1.25rem; }
      .card-body p label { font-weight: 600; font-size: 0.95rem; color: #495057; margin-bottom: 8px; display: block; text-transform: uppercase; letter-spacing: 0.5px; }
      .card-body p input[type="text"], .card-body p input[type="number"], .card-body p input[type="email"], .card-body p select, .card-body p textarea {
        display: block; width: 100%; padding: 0.75rem 1rem; font-size: 1.05rem; color: #212529; background-color: #f8f9fa; border: 1px solid #ced4da; border-radius: 10px; min-height: 50px;
      }
      .card-body p select { background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%23343a40' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 1rem center; background-size: 16px 12px; padding-right: 2.5rem; }
      .footer-bg { background-color: #f8f9fa; border-top: 1px solid #e9ecef; }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8 col-xl-7"> 
          <div class="card">
            <div class="card-header"><h1><i class="bi bi-person-lines-fill me-2"></i> Datos de Alumno</h1></div>
            <div class="card-body p-4 p-md-5">
              <form method="POST" id="form-carga-alumno">
                {% csrf_token %}
                <h5><i class="bi bi-info-circle me-2"></i> Información Personal</h5>
                <div class="mb-4">{{ alumno_form.as_p }}</div>
                <h5><i class="bi bi-mortarboard me-2"></i> Grado y Sección</h5>
                <div class="row mb-4">
                  <div class="col-md-6 mb-3 mb-md-0">{{ grado_form.as_p }}</div>
                  <div class="col-md-6">{{ seccion_form.as_p }}</div>
                </div>
                <button type="submit" id="btn-submit" class="btn btn-primary btn-custom w-100 mt-3 shadow-sm">
                  <i class="fas fa-save me-2"></i> Guardar registro
                </button>
              </form>
            </div>
            <div class="card-footer footer-bg p-4 px-md-5">
              <a href="{% url 'evaluaciones_educativas:fluidez_2026:lista' fid_actual=fid_actual %}" id="btn-volver" class="btn btn-outline-secondary fw-semibold w-100 py-2" style="border-radius: 10px; font-size: 1.05rem;">
                <i class="bi bi-arrow-left me-2"></i> Volver a la Lista
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
   <script>
  document.addEventListener("DOMContentLoaded", function () {
    const form = document.getElementById("form-carga-alumno");
    const btnSubmit = document.getElementById("btn-submit");
    const btnVolver = document.getElementById("btn-volver");

    // Seleccionamos los inputs fuera del submit para poder usarlos al cargar
    const inputNombre = document.querySelector('input[name="nombre"]');
    const inputApellido = document.querySelector('input[name="apellido"]');
    const inputDni = document.querySelector('input[name="dni"]');

    // Si al cargar la página ya hay texto (porque estamos editando), lo pasamos a mayúscula.
    if (inputNombre && inputNombre.value) inputNombre.value = inputNombre.value.toUpperCase();
    if (inputApellido && inputApellido.value) inputApellido.value = inputApellido.value.toUpperCase();

    // --- Funcionalidad de Loading ---
    function activarLoading(elemento) {
        if (elemento.dataset.htmlOriginal) return;
        elemento.dataset.htmlOriginal = elemento.innerHTML;
        elemento.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Cargando...';
        elemento.classList.add('disabled');
        elemento.style.pointerEvents = 'none';
    }

    // --- VALIDACIÓN Y ENVÍO DEL FORMULARIO ---
    form.addEventListener("submit", function(event) {
        let esValido = true;
        let errores = []; 
        
        // 1. Validar Selects (Turno y Sección)
        const selects = form.querySelectorAll("select");
        selects.forEach(select => {
            const opcionTexto = select.options[select.selectedIndex].text;
            if (opcionTexto.includes("SELECCIONE TURNO Y SECCIÓN") || select.value === "") {
                esValido = false;
                select.classList.add("is-invalid");
                if (!errores.includes("Debe seleccionar un Turno y Sección válido.")) {
                    errores.push("Debe seleccionar un Turno y Sección válido.");
                }
            } else {
                select.classList.remove("is-invalid");
            }
        });

        // 2. Validar Nombre (Mayúsculas y Mínimo 3 letras)
        if (inputNombre) {
            if (inputNombre.value !== inputNombre.value.toUpperCase()) {
                esValido = false;
                inputNombre.classList.add("is-invalid");
                errores.push("El Nombre debe estar completamente en MAYÚSCULAS.");
            } else if (inputNombre.value.trim().length < 3) {
                esValido = false;
                inputNombre.classList.add("is-invalid");
                errores.push("El Nombre debe tener al menos 3 letras.");
            } else {
                inputNombre.classList.remove("is-invalid");
            }
        }

        // 3. Validar Apellido (Mayúsculas y Mínimo 3 letras)
        if (inputApellido) {
            if (inputApellido.value !== inputApellido.value.toUpperCase()) {
                esValido = false;
                inputApellido.classList.add("is-invalid");
                errores.push("El Apellido debe estar completamente en MAYÚSCULAS.");
            } else if (inputApellido.value.trim().length < 3) {
                esValido = false;
                inputApellido.classList.add("is-invalid");
                errores.push("El Apellido debe tener al menos 3 letras.");
            } else {
                inputApellido.classList.remove("is-invalid");
            }
        }

        // 💡 NUEVO: 4. Validar DNI (No menos de 8 caracteres)
        if (inputDni) {
            if (inputDni.value.trim().length < 8) {
                esValido = false;
                inputDni.classList.add("is-invalid");
                errores.push("El DNI debe tener exactamente 8 números.");
            } else {
                inputDni.classList.remove("is-invalid");
            }
        }

        // Si hay errores, frenamos el envío y mostramos la alerta
        if (!esValido) {
            event.preventDefault(); // Detiene el POST
            alert("Por favor, corrija lo siguiente antes de guardar:\n\n- " + errores.join("\n- "));
            return; // Corta la ejecución para que NO se active el loading
        }

        // Si pasó la validación, activa el loading
        activarLoading(btnSubmit);
    });

    btnVolver.addEventListener("click", (e) => {
        activarLoading(btnVolver);
    });

    // --- Restaurar estado si el usuario usa el botón "Atrás" ---
    window.addEventListener('pageshow', function (event) {
        if (event.persisted) {
            [btnSubmit, btnVolver].forEach(btn => {
                if (btn.dataset.htmlOriginal) {
                    btn.innerHTML = btn.dataset.htmlOriginal;
                    btn.classList.remove('disabled');
                    btn.style.pointerEvents = 'auto';
                    delete btn.dataset.htmlOriginal;
                }
            });
        }
    });

    // --- Validaciones de campos (DNI y Mayúsculas al escribir) ---
    if (inputDni) {
        inputDni.setAttribute("inputmode", "numeric");
        inputDni.addEventListener("input", function () {
            this.value = this.value.replace(/\D/g, '').substring(0, 8);
        });
    }

    function forzarMayusculas() {
        const pos = this.selectionStart;
        this.value = this.value.toUpperCase();
        this.setSelectionRange(pos, pos);
    }

    if (inputNombre) inputNombre.addEventListener("input", forzarMayusculas);
    if (inputApellido) inputApellido.addEventListener("input", forzarMayusculas);
  });
</script>
  </body>
</html>
