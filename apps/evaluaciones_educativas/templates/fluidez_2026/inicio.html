<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Selección de Cueanexo y Grado</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: linear-gradient(135deg, #f2f6ff, #ffffff);
        min-height: 100vh;
        padding: 40px 20px;
      }

      .card {
        max-width: 600px;
        margin: auto;
        border-radius: 20px;
        border: none;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
      }

      .card-header {
        background: linear-gradient(90deg, #0064d2, #003c94);
        color: white;
        text-align: center;
        padding: 22px;
        border-radius: 20px 20px 0 0 !important;
      }

      h1 {
        font-size: 1.6rem;
        margin: 0;
        font-weight: 600;
      }

      label.section-title {
        font-weight: 600;
        color: #003c94;
        display: block;
        margin-bottom: 10px;
        text-align: center;
      }

      input[type="text"],
      select,
      textarea {
        width: 100% !important;
        min-height: 45px;
        font-size: 1rem;
      }

      .btn-custom {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        font-weight: 600;
      }

      .divider {
        height: 1px;
        background-color: #e0e0e0;
        margin: 25px 0;
      }

      .radio-list label {
        margin-right: 15px;
        margin-bottom: 10px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <div class="card-header">
        <h1>Seleccionar Cueanexo y Grado</h1>
      </div>
      <div class="card-body p-4">
        
        <form method="POST" id="form-unico">
          {% csrf_token %}
          
          <div class="mb-3">
            <label for="cueanexo-select" class="section-title">Cueanexo</label>
            <select name="cueanexo" id="cueanexo-select" class="form-select" onchange="this.form.submit()" required>
              {% for eleccion in cueanexo_form.cueanexo %}
                {{ eleccion }}
              {% endfor %}
            </select>
          </div>

          <div class="divider"></div>

          <div class="mb-4">
            <label class="section-title">Grado</label>
            <div class="radio-list text-center">
              {% if grado_form %}
                {% for eleccion in grado_form.grado %}
                  {{ eleccion }}
                {% endfor %}
              {% else %}
                <p class="text-muted small">Selecciona un Cueanexo para ver los grados.</p>
              {% endif %}
            </div>
          </div> 

          <button
            id="btn-guardar"
            type="submit"
            class="btn btn-primary btn-custom"
            disabled="disabled"
          >
            Ir al siguiente paso
          </button>
        </form>

      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const selectCueanexo = document.getElementById("cueanexo-select");
        const btnGuardar = document.getElementById("btn-guardar");

        // Bloqueamos el botón por defecto ni bien el DOM termina de cargar
        btnGuardar.disabled = true;

        function validar() {
          // 1. Evaluar Cueanexo: Debe existir y su valor no debe ser un texto vacío o guiones
          let cueanexoOk = false;
          if (selectCueanexo && selectCueanexo.value.trim() !== "" && !selectCueanexo.value.includes("---")) {
            cueanexoOk = true;
          }

          // 2. Evaluar Grado: Buscamos si existe al menos UN radio que esté activado
          let gradoOk = false;
          const radios = document.querySelectorAll('input[type="radio"]');
          for (let i = 0; i < radios.length; i++) {
            if (radios[i].checked) {
              gradoOk = true;
              break;
            }
          }

          // 3. Condición estricta: Solo si AMBOS son verdaderos, se habilita
          if (cueanexoOk && gradoOk) {
            btnGuardar.disabled = false;
          } else {
            btnGuardar.disabled = true;
          }
        }

        // Asignamos el listener a los botones de radio que se hayan renderizado
        const radios = document.querySelectorAll('input[type="radio"]');
        radios.forEach(function (radio) {
          radio.addEventListener("change", validar);
        });

        // Corremos la validación inicial (útil cuando se recarga la página después de hacer el POST de cueanexo)
        validar();
      });
    </script>
  </body>
</html>
