<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Selección de Cueanexo y Grado</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: linear-gradient(135deg, #f2f6ff, #ffffff);
        min-height: 100vh;
        padding: 40px 20px;
      }

      .card {
        max-width: 600px;
        margin: auto;
        border-radius: 20px;
        border: none;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
      }

      .card-header {
        background: linear-gradient(90deg, #0064d2, #003c94);
        color: white;
        text-align: center;
        padding: 22px;
        border-radius: 20px 20px 0 0 !important;
      }

      h1 {
        font-size: 1.6rem;
        margin: 0;
        font-weight: 600;
      }

      label.section-title {
        font-weight: 600;
        color: #003c94;
        display: block;
        margin-bottom: 10px;
        text-align: center;
      }

      input,
      select,
      textarea {
        width: 100% !important;
        min-height: 45px;
        font-size: 1rem;
      }

      .btn-custom {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        font-weight: 600;
      }

      .divider {
        height: 1px;
        background-color: #e0e0e0;
        margin: 25px 0;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <div class="card-header">
        <h1>Seleccionar Cueanexo y Grado</h1>
      </div>
      <div class="card-body p-4">
        <form method="POST" id="form-unico">
          {% csrf_token %}

          <!-- SECCIÓN 1: SELECT -->
          <div class="mb-3">
            <label for="cueanexo-select" class="section-title">Cueanexo</label>
            <select name="cueanexo" id="cueanexo-select" class="form-select" required>
              {% for eleccion in grado_form_data.cueanexo %}
              <option value="{{ eleccion.data.value }}">{{ eleccion.choice_label }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="divider"></div>

          <!-- SECCIÓN 2: RADIOS -->
          <div class="mb-4">
            <label class="section-title">Grado</label>
            <div style="display: flex; justify-content: center; flex-wrap: wrap; gap: 15px;">
              {% for eleccion in grado_form_data.grado %}
              <div class="form-check form-check-inline m-0">
                {{ eleccion.tag }}
                <label class="form-check-label" for="{{ eleccion.id_for_label }}">
                  {{ eleccion.choice_label }}
                </label>
              </div>
              {% endfor %}
            </div>
          </div>

          <button
            id="btn-guardar"
            type="submit"
            class="btn btn-primary btn-custom"
            disabled
          >
            Ir al siguiente paso
          </button>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const form = document.getElementById("form-unico");
        const select = document.getElementById("cueanexo-select");
        const radios = document.querySelectorAll('input[name="grado"]');
        const btnGuardar = document.getElementById("btn-guardar");

        function validar() {
          const selectOk = select.value !== "";
          const radioOk = Array.from(radios).some(r => r.checked);
          
          btnGuardar.disabled = !(selectOk && radioOk);
        }

        select.addEventListener("change", validar);
        radios.forEach(r => r.addEventListener("change", validar));
      });
    </script>
  </body>
</html>
