<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seleccionar Materia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">Seleccionar Materia del Examen</h3>
            </div>
            <div class="card-body">
                <div class="alert alert-info">
                    <strong>Alumno:</strong> {{ alumno.nombre }} {{ alumno.apellido }} — <strong>DNI:</strong> {{ alumno.dni }}
                </div>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        {% for choice in form.materia %}
                        <div class="form-check form-check-lg">
                            {{ choice.tag }}
                            <label class="form-check-label" for="{{ choice.id_for_label }}">
                                {{ choice.choice_label }}
                            </label>
                        </div>
                        {% endfor %}
                    </div>
                    <button type="submit" class="btn btn-primary">Continuar</button>
                    <a href="{% url 'evaluaciones_educativas:diagnostico_2026:inicio' %}" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
