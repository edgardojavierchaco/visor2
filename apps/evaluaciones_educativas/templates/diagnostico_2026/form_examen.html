<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario de Evaluación - {{ materia }}</title>
  <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
</head>
<body>
  <div class="container mt-4">
    <div class="card">
        <div class="card-header bg-dark text-white">
            <h4>Cargar Evaluación de {{ materia }}</h4>
            <p class="mb-0">Alumno: {{ alumno.apellido }}, {{ alumno.nombre }} (DNI: {{ alumno.dni }})</p>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                
                <div class="row">
                    {% for field in form %}
                    <div class="col-md-4 mb-3">
                        <label class="form-label font-weight-bold">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small">{{ field.errors }}</div>
                        {% endif %}
                    </div>
                    {% endfor %}
                </div>

                <div class="mt-4 text-right">
                    <a href="{% url 'inicio' %}" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary">Guardar Evaluación</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
