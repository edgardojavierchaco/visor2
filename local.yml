version: "3.9"

volumes:
  visor_local_postgres_data:
  visor_local_postgres_data_backups:
  redis_data:

services:

  # =========================================================
  # DJANGO
  # =========================================================
  django:
    build:
      context: .
      dockerfile: ./compose/local/django/Dockerfile
      target: runtime

      args:
        BUILD_ENVIRONMENT: local
        UID: ${UID:-1000}
        GID: ${GID:-1000}

    image: visor_local_django
    container_name: visor_local_django

    depends_on:
      postgres:
        condition: service_healthy

      redis:
        condition: service_healthy

    volumes:
      - .:/app:cached
      - ./logs:/app/logs
      - ./media:/app/media
      - ./productionfiles:/app/productionfiles

    env_file:
      - ./.env

    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      PYTHONUNBUFFERED: 1

    ports:
      - "8000:8000"

    command: /start

    restart: unless-stopped

    stdin_open: true
    tty: true

    # =========================================================
  # POSTGRES
  # =========================================================
  postgres:
    image: postgres:16-bookworm

    container_name: visor_local_postgres

    volumes:
      - visor_local_postgres_data:/var/lib/postgresql/data
      - visor_local_postgres_data_backups:/backups

    env_file:
      - ./.env

    ports:
      - "5433:5432"

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # =========================================================
  # REDIS
  # =========================================================
  redis:
    image: redis:7-alpine
    container_name: visor_local_redis

    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # =========================================================
  # CELERY WORKER
  # =========================================================
  celery:
    image: visor_local_django
    container_name: visor_local_celery

    command: celery -A config worker -l info

    depends_on:
      postgres:
        condition: service_healthy

      redis:
        condition: service_healthy

    env_file:
      - ./.env

    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      PYTHONUNBUFFERED: 1

    volumes:
      - .:/app:cached
      - ./logs:/app/logs
      - ./media:/app/media
      - ./productionfiles:/app/productionfiles

    restart: unless-stopped

  # =========================================================
  # CELERY BEAT
  # =========================================================
  celery-beat:
    image: visor_local_django
    container_name: visor_local_celery_beat

    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler

    depends_on:
      postgres:
        condition: service_healthy

      redis:
        condition: service_healthy

    env_file:
      - ./.env

    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      PYTHONUNBUFFERED: 1

    volumes:
      - .:/app:cached
      - ./logs:/app/logs
      - ./media:/app/media
      - ./productionfiles:/app/productionfiles

    restart: unless-stopped