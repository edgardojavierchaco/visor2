version: "3.9"

volumes:
  visor_local_postgres_data: {}
  visor_local_postgres_data_backups: {}
  redis_data:

services:
  django:
    build:
      context: .
      dockerfile: ./compose/local/django/Dockerfile
      target: python-run-stage   # Apunta a la etapa final optimizada
    image: visor_local_django
    container_name: visor_local_django
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app:cached   # cached para acelerar montajes
    env_file:
      - ./.env
    ports:
      - "8000:8000"
    command: /start

  postgres:
    build:
      context: .
      dockerfile: ./compose/production/postgres/Dockerfile
    image: visor_production_postgres
    container_name: visor_local_postgres
    volumes:
      - visor_local_postgres_data:/var/lib/postgresql/data
      - visor_local_postgres_data_backups:/backups
    env_file:
      - ./.env
    ports:
      - "5433:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: visor_local_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  celery:
    build:
      context: .
      dockerfile: ./compose/local/django/Dockerfile
      target: python-run-stage
    image: visor_local_django
    container_name: visor_local_celery
    depends_on:
      redis:
        condition: service_healthy
      django:
        condition: service_started
    env_file:
      - ./.env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.local
    command: celery -A config worker -l info
    volumes:
      - .:/app:cached
    restart: unless-stopped

  celery-beat:
    build:
      context: .
      dockerfile: ./compose/local/django/Dockerfile
      target: python-run-stage
    image: visor_local_django
    container_name: visor_local_celery_beat
    depends_on:
      redis:
        condition: service_healthy
      django:
        condition: service_started
    env_file:
      - ./.env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.local
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app:cached
    restart: unless-stopped
